<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidonie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Sidonie Palette (Keeps the warm neutral base, very elegant)
              gray: {
                50: '#FFFCF9', 
                100: '#F5F5F4',
                200: '#E7E5E4',
                300: '#D6D3D1',
                400: '#A8A29E',
                500: '#78716C',
                600: '#57534E',
                700: '#44403C',
                800: '#292524',
                900: '#1C1917',
                950: '#0C0A09',
              },
            },
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            },
            typography: (theme) => ({
              DEFAULT: {
                css: {
                  color: theme('colors.gray.800'),
                  maxWidth: 'none',
                  lineHeight: '1.75',
                  letterSpacing: '-0.01em',
                  p: { marginTop: '1em', marginBottom: '1em' },
                  'ul > li': { paddingLeft: '0.375em' },
                  a: {
                    color: theme('colors.gray.900'),
                    textDecoration: 'underline',
                    textDecorationColor: theme('colors.gray.300'),
                    textUnderlineOffset: '4px',
                    fontWeight: '500',
                    '&:hover': { textDecorationColor: theme('colors.gray.900') },
                  },
                  code: {
                    color: theme('colors.gray.900'),
                    backgroundColor: theme('colors.gray.100'),
                    padding: '2px 4px',
                    borderRadius: '4px',
                    fontWeight: '500',
                    border: '1px solid ' + theme('colors.gray.200'),
                    fontSize: '0.875em',
                  },
                  'code::before': { content: '""' },
                  'code::after': { content: '""' },
                  pre: {
                    backgroundColor: '#1C1917', // Warm dark
                    color: theme('colors.gray.50'),
                    borderRadius: '0.5rem',
                    padding: '1rem',
                    lineHeight: '1.6',
                    border: '1px solid ' + theme('colors.gray.200'),
                  },
                  'h1, h2, h3, h4': {
                    color: theme('colors.gray.900'),
                    fontWeight: '600',
                    letterSpacing: '-0.02em',
                  },
                  blockquote: {
                    borderLeftColor: theme('colors.gray.300'),
                    fontStyle: 'normal',
                    color: theme('colors.gray.600'),
                  }
                },
              },
            }),
          },
        },
        plugins: [
          function({ addUtilities }) {
            const newUtilities = {
              '.scrollbar-hide': {
                '-ms-overflow-style': 'none',
                'scrollbar-width': 'none',
                '&::-webkit-scrollbar': { display: 'none' }
              }
            }
            addUtilities(newUtilities)
          }
        ],
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #ffffff;
        color: #1C1917;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #E7E5E4;
        border-radius: 20px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #D6D3D1; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.569.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-syntax-highlighter/": "https://esm.sh/react-syntax-highlighter@^16.1.0/",
    "react-syntax-highlighter": "https://esm.sh/react-syntax-highlighter@^16.1.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.1",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "mermaid": "https://esm.sh/mermaid@^11.12.3"
  }
}
</script>
</head>
  <body class="bg-white text-gray-900">
    <div id="root"></div>
  </body>
</html>
